<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CFT Inventory - Simple Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #1a1a1a; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #2a2a2a; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat { background: #2a2a2a; padding: 15px; border-radius: 8px; }
        .loading { color: #f59e0b; }
        .error { color: #ef4444; }
        .success { color: #22c55e; }
    </style>
</head>
<body>
    <h1>CFT Inventory System - Simple Test</h1>
    <div id="status" class="loading">Loading...</div>
    
    <div class="stats">
        <div class="stat">
            <div>Total Items</div>
            <h2 id="totalItems">0</h2>
        </div>
        <div class="stat">
            <div>Categories</div>
            <h2 id="categories">0</h2>
        </div>
        <div class="stat">
            <div>Total Value</div>
            <h2 id="totalValue">₹0</h2>
        </div>
    </div>
    
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>Item ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Quantity</th>
                <th>Status</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6">Loading data...</td></tr>
        </tbody>
    </table>

    <script>
        console.log('🚀 Script started');
        
        async function loadInventory() {
            try {
                console.log('📡 Fetching data...');
                const response = await fetch('/.netlify/functions/get-inventory?_=' + Date.now());
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const csvText = await response.text();
                console.log('📥 Received', csvText.length, 'bytes');
                
                const lines = csvText.trim().split('\n');
                console.log('📊 Total lines:', lines.length);
                
                const data = [];
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split(',');
                    if (parts[0]) {
                        data.push({
                            id: parts[0],
                            name: parts[1],
                            category: parts[2],
                            qty: parseInt(parts[4]) || 0,
                            status: parts[5],
                            value: parseInt(parts[7]) || 0
                        });
                    }
                }
                
                console.log('✅ Parsed', data.length, 'items');
                
                // Update stats
                const total = data.reduce((sum, item) => sum + item.qty, 0);
                const categories = [...new Set(data.map(item => item.category))].length;
                const totalValue = data.reduce((sum, item) => sum + (item.value * item.qty), 0);
                
                document.getElementById('totalItems').textContent = total;
                document.getElementById('categories').textContent = categories;
                document.getElementById('totalValue').textContent = '₹' + totalValue.toLocaleString('en-IN');
                
                // Update table
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = data.slice(0, 50).map(item => `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>${item.category}</td>
                        <td>${item.qty}</td>
                        <td>${item.status}</td>
                        <td>₹${item.value.toLocaleString('en-IN')}</td>
                    </tr>
                `).join('');
                
                document.getElementById('status').textContent = '✅ Loaded ' + data.length + ' items successfully!';
                document.getElementById('status').className = 'success';
                
            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('status').textContent = '❌ Error: ' + error.message;
                document.getElementById('status').className = 'error';
            }
        }
        
        // Start loading
        loadInventory();
    </script>
</body>
</html>
